name: CI
on:
  push:
    branches: [master, main]
  pull_request:
env:
  CARGO_TERM_COLOR: always
jobs:
  check-unused-deps:
    name: Prune Unused Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: taiki-e/install-action@bffeee26d4db9be238a4ea78d8826604ebcb594d # v2.82.5
        with:
          tool: cargo-machete
      - run: cargo machete
  sort-cargo-toml:
    name: Sort Cargo.toml
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: taiki-e/install-action@bffeee26d4db9be238a4ea78d8826604ebcb594d # v2.82.5
        with:
          tool: cargo-sort
      - run: cargo sort
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
      - name: Install rust
        id: install-rust
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable
          components: rustfmt,clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: "${{ steps.install-rust.outputs.cachekey }}"
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo fmt --all -- --check
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # bump this when bumping the MSRV
        rust: ["1.88.0", stable, beta]
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Install rust
        id: install-rust
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: "${{ steps.install-rust.outputs.cachekey }}"
      - uses: taiki-e/install-action@bffeee26d4db9be238a4ea78d8826604ebcb594d # v2.82.5
        with:
          tool: nextest@0.9.126
      - name: Test
        run: cargo nextest run
  audit:
    name: Run cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Check
        uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2.0.20
